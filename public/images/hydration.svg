<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22D3EE;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#164E63;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.12);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgba(255,255,255,0);stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#shine)" />
  <g opacity="0.05">
    <line x1="0" y1="0" x2="1200" y2="630" stroke="white" stroke-width="1"/>
    <line x1="400" y1="0" x2="1200" y2="420" stroke="white" stroke-width="1"/>
    <line x1="800" y1="0" x2="1200" y2="210" stroke="white" stroke-width="1"/>
    <line x1="0" y1="210" x2="800" y2="630" stroke="white" stroke-width="1"/>
    <line x1="0" y1="420" x2="400" y2="630" stroke="white" stroke-width="1"/>
  </g>
  <circle cx="150" cy="500" r="120" fill="white" opacity="0.04" />
  <circle cx="1050" cy="130" r="180" fill="white" opacity="0.04" />
  <!-- Water drop icon -->
  <text x="600" y="300" text-anchor="middle" font-size="160" filter="drop-shadow(0 4px 8px rgba(0,0,0,0.3))">&#128167;</text>
  <!-- Title -->
  <text x="600" y="440" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="white" letter-spacing="4" filter="drop-shadow(0 2px 4px rgba(0,0,0,0.3))">Hydration</text>
  <rect x="500" y="460" width="200" height="3" rx="1.5" fill="white" opacity="0.4" />
  <text x="600" y="500" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="white" opacity="0.7" letter-spacing="6">HEALTH GUIDE</text>
</svg>